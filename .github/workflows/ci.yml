name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --group dev

      - name: Lint
        run: uv run ruff check src tests

      - name: Type check
        run: uv run mypy

      - name: Test
        run: uv run pytest

  pandas-free:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.13"

      - name: Install without pandas
        run: |
          uv venv .venv-no-pandas
          uv pip install --python .venv-no-pandas/bin/python \
            ".[bobyqa]" polars pytest
          # Explicitly verify pandas is absent
          ! .venv-no-pandas/bin/python -c "import pandas" 2>/dev/null

      - name: Run pandas-free tests
        run: |
          .venv-no-pandas/bin/python -m pytest tests/test_polars_only.py -v
